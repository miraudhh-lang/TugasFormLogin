<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard</title>
</head>

<body>

    <div class="dashboard">

        <div class="sidebar">

            <div class="logo">
                <h2>🧸 My Dashboard</h2>
            </div>

            <ul>
                <li>🏠 Home</li>
                <li>📅 Calendar</li>
                <li>⚙️ Settings</li>
            </ul>

        </div>

        <div class="main-content">

            <div class="header">
                <h1>Selamat Datang, all👋</h1>
                <div class="header-right">
                    <div class="profile">
                     👧
                    </div>
                <a href="login.html" class="logout">Logout</a>
                </div>
            </div>
        </div>
    </div>

</body>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    min-height:100vh;
    background-image: url(bear.jpeg);
    background-size: cover;
    background-position: center;
    padding:20px;
}

.dashboard{
    display:flex;
    gap:20px;
}

.sidebar{
    width:250px;
    background:#fffaf5;
    padding:25px;
    border-radius:25px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo h2{
    color:#6b4f3a;
}

.sidebar ul{
    list-style:none;
}

.sidebar li{
    padding:15px;
    margin-bottom:10px;
    border-radius:15px;
    cursor:pointer;
}

.sidebar li:hover{
    background:#f2dfc7;
}

.main-content{
    flex:1;
}

.header{
    background:#fffaf5;
    padding:25px;
    border-radius:25px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header-right{
    display:flex;
    align-items:center;
    gap:15px;
}

.logout{
    text-decoration:none;
    background:#d8b89c;
    color:white;

    padding:10px 20px;
    border-radius:20px;

    transition:.3s;
}

.logout:hover{
    background:#c7a27f;
}

.profile{
    width:60px;
    height:60px;
    border-radius:50%;
    background:#e8d5c4;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:25px;
}
</style>

</html>
