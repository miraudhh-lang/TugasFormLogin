<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <div class="login-box">

        <h1>Welcome To ✨</h1>
        <p class="subtitle">Login to continue</p>

        <form action="home.html">

            <input type="text"
                   placeholder="Username"
                   required>

            <input type="email"
                   placeholder="Email"
                   required>

            <input type="password"
                   placeholder="Password"
                   required>

            <div class="options">
                <label>
                    <input type="checkbox">
                    Remember me
                </label>

                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit">
                Login 🐾
            </button>

            <p class="signup">
                Don't have an account?
                <a href="#">Sign Up</a>
            </p>

        </form>

    </div>
</body>
</html>
